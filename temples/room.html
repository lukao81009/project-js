<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="../styles/room.css">
</head>
<body>

    <header>
        <div class="hleft">
            <img src="https://hotelbooking.stepprojects.ge/images/logo-retina.png" alt="logo">
        </div>
        <div class="hright">
            <input type="checkbox" id="nav-toggle">
            <label for="nav-toggle" class="burger">&#9776;</label>
            <ul>
                <li><a href="./home.html">Home</a></li>
                <li><a href="">Rooms</a></li>
                <li><a href="../index.html">Hotels</a></li>
                <li><a href="./booked.html">Booked Room</a></li>
                <li><a href="./login.html">Log in</a></li>
                <li><a href="./register.html">Register</a></li>
            </ul>
        </div>
    </header>

    <section class="filter-bar">
        <input id="maxPrice" type="number" min="0" placeholder="Max price ($)"> 
    
        <select id="guestFilter">
            <option value="0">Guests</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>

        <select id="typeFilter">
            <option value="0">Any type</option>
            <option value="1">Single room</option>
            <option value="2">Double room</option>
            <option value="3">Deluxe room</option>
        </select>
        <button id="applyRoomFilters" type="button">Apply</button>
        <button id="clearRoomFilters" type="button">Clear</button>
    </section>

    <div id="rooms">

    </div>


    <footer>
        <p>© 2023 IT Academy Step All; Rights Reserved</p>
    </footer>

    <script src="../js/room.js"></script>
    
</body>
</html>
